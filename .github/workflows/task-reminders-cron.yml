name: Task Reminders Cron

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL (without trailing slash)"
        required: false
        default: "https://pecal.site"
        type: string

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger task reminders cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INPUT_BASE_URL: ${{ github.event.inputs.base_url }}
          DEFAULT_BASE_URL: https://pecal.site
        run: |
          set -euo pipefail

          if [[ -z "${CRON_SECRET}" ]]; then
            echo "::error::CRON_SECRET is not configured in repository secrets."
            exit 1
          fi

          BASE_URL="${INPUT_BASE_URL:-$DEFAULT_BASE_URL}"
          BASE_URL="${BASE_URL%/}"
          URL="${BASE_URL}/api/cron/task-reminders"

          echo "Calling ${URL}"
          STATUS=$(curl -sS -o /tmp/task-reminders-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            "${URL}")

          cat /tmp/task-reminders-response.json || true
          echo
          echo "HTTP status: ${STATUS}"

          if [[ "${STATUS}" -lt 200 || "${STATUS}" -ge 300 ]]; then
            echo "::error::Task reminder cron failed with status ${STATUS}"
            exit 1
          fi
