name: Desktop Tauri Build & Upload

on:
  push:
    tags:
      - 'desktop-win-v*'
      - 'desktop-mac-v*'
  workflow_dispatch:

jobs:
  select-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Select platform matrix by tag
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          EVENT_NAME="${GITHUB_EVENT_NAME:-}"
          REF_NAME="${GITHUB_REF_NAME:-}"

          WINDOWS_MATRIX='{"include":[{"os":"windows-latest","platform":"windows","arch":"x64","artifact_name":"windows-build"}]}'
          MAC_MATRIX='{"include":[{"os":"macos-13","platform":"macos","arch":"x64","artifact_name":"macos-intel-build"},{"os":"macos-14","platform":"macos","arch":"arm64","artifact_name":"macos-apple-silicon-build"}]}'
          FULL_MATRIX='{"include":[{"os":"windows-latest","platform":"windows","arch":"x64","artifact_name":"windows-build"},{"os":"macos-13","platform":"macos","arch":"x64","artifact_name":"macos-intel-build"},{"os":"macos-14","platform":"macos","arch":"arm64","artifact_name":"macos-apple-silicon-build"}]}'

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            MATRIX="$FULL_MATRIX"
          elif [[ "$REF_NAME" == desktop-win-v* ]]; then
            MATRIX="$WINDOWS_MATRIX"
          elif [[ "$REF_NAME" == desktop-mac-v* ]]; then
            MATRIX="$MAC_MATRIX"
          else
            echo "::error::Unsupported tag format: $REF_NAME. Use desktop-win-v<version> or desktop-mac-v<version>."
            exit 1
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    needs: select-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple Developer certificate (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          REQUESTED_IDENTITY="${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}"

          if base64 --help 2>/dev/null | grep -q -- "--decode"; then
            echo "${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}" | base64 --decode > "$CERT_PATH"
          else
            echo "${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "${{ secrets.APPLE_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.APPLE_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${{ secrets.APPLE_KEYCHAIN_PASSWORD }}" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | tee "$RUNNER_TEMP/codesign-identities.txt"

          # Prefer exact requested identity if it exists in imported keychain.
          RESOLVED_IDENTITY=""
          if [[ -n "$REQUESTED_IDENTITY" ]] && grep -Fq "\"$REQUESTED_IDENTITY\"" "$RUNNER_TEMP/codesign-identities.txt"; then
            RESOLVED_IDENTITY="$REQUESTED_IDENTITY"
          fi

          # Fallback to first Developer ID Application identity.
          if [[ -z "$RESOLVED_IDENTITY" ]]; then
            RESOLVED_IDENTITY="$(grep -Eo '"Developer ID Application:[^"]+"' "$RUNNER_TEMP/codesign-identities.txt" | head -n 1 || true)"
          fi

          if [[ -z "$RESOLVED_IDENTITY" ]]; then
            echo "::error::No Developer ID Application identity was imported. Ensure the p12 contains Developer ID Application cert + private key."
            exit 1
          fi

          if [[ "$RESOLVED_IDENTITY" != Developer\ ID\ Application:* ]]; then
            echo "::error::Resolved identity is not Developer ID Application: $RESOLVED_IDENTITY"
            exit 1
          fi

          echo "Resolved APPLE_CERTIFICATE_IDENTITY: $RESOLVED_IDENTITY"
          echo "APPLE_CERTIFICATE_IDENTITY=$RESOLVED_IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Setup Azure Signing
        if: matrix.platform == 'windows'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          az login --service-principal -u "${{ secrets.AZURE_CLIENT_ID }}" -p "${{ secrets.AZURE_CLIENT_SECRET }}" --tenant "${{ secrets.AZURE_TENANT_ID }}"

          New-Item -ItemType Directory -Force -Path signing-tools | Out-Null
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile "signing-tools\nuget.exe"
          & "signing-tools\nuget.exe" install Microsoft.ArtifactSigning.Client -OutputDirectory signing-tools -ExcludeVersion

          @{
            Endpoint = "https://krc.codesigning.azure.net"
            CodeSigningAccountName = "callendsigning"
            CertificateProfileName = "DesktopCalendarProfile"
            ExcludeCredentials = @(
              "ManagedIdentityCredential"
              "WorkloadIdentityCredential"
              "SharedTokenCacheCredential"
              "VisualStudioCredential"
              "VisualStudioCodeCredential"
              "AzurePowerShellCredential"
              "AzureDeveloperCliCredential"
              "InteractiveBrowserCredential"
              "EnvironmentCredential"
            )
          } | ConvertTo-Json | Set-Content "signing-tools\metadata.json"

          if (Test-Path "signing-tools\Microsoft.ArtifactSigning.Client\bin\x64\Azure.CodeSigning.Dlib.dll") {
            Write-Host "Signing dlib installed successfully"
          } else {
            Write-Error "Signing dlib not found"
            exit 1
          }

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          if ($eventName -eq "workflow_dispatch") {
            $version = node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version"
          } else {
            $refName = "${{ github.ref_name }}"
            if ($refName -match '^desktop-(win|mac)-v(.+)$') {
              $version = $matches[2]
            } elseif ($refName -match '^v(.+)$') {
              $version = $matches[1]
            } else {
              Write-Error "Unsupported tag format: $refName. Use desktop-win-v<version> or desktop-mac-v<version>."
              exit 1
            }
          }
          if (-not $version) {
            Write-Error "Could not resolve version"
            exit 1
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Update version in tauri.conf.json
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          Write-Host "Updating version to $version"
          node scripts/update-version.mjs "$version"
          Select-String -Path src-tauri/tauri.conf.json -Pattern '"version"' | Select-Object -First 1

      - name: Enforce offline installer mode (Store compliance)
        if: matrix.platform == 'windows'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $config = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $mode = $config.bundle.windows.webviewInstallMode.type
          if (-not $mode) {
            Write-Error "bundle.windows.webviewInstallMode.type is missing"
            exit 1
          }
          if ($mode -ne "offlineInstaller" -and $mode -ne "fixedRuntime") {
            Write-Error "Invalid webviewInstallMode '$mode'. Use offlineInstaller or fixedRuntime for standalone installer compliance."
            exit 1
          }
          Write-Host "webviewInstallMode is '$mode' (offline-compliant)"

      - name: Verify signing files
        if: matrix.platform == 'windows'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          if (-not (Test-Path "signing-tools/metadata.json")) {
            Write-Error "missing signing-tools/metadata.json"
            exit 1
          }
          if (-not (Test-Path "signing-tools/Microsoft.ArtifactSigning.Client/bin/x64/Azure.CodeSigning.Dlib.dll")) {
            Write-Error "missing Azure.CodeSigning.Dlib.dll"
            exit 1
          }
          Write-Host "signing prerequisites are ready"

      - name: Build Tauri app
        working-directory: apps/desktop
        shell: pwsh
        run: pnpm tauri:build:ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE_IDENTITY: ${{ env.APPLE_CERTIFICATE_IDENTITY }}

      - name: Sign + notarize + staple DMG (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE_IDENTITY: ${{ env.APPLE_CERTIFICATE_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_KEYCHAIN_PATH: ${{ env.APPLE_KEYCHAIN_PATH }}
          APPLE_NOTARY_PROFILE: tauri-notary
          POLL_INTERVAL_SEC: 20
          TIMEOUT_SEC: 3600
          NOTARY_RETRY_MAX: 5
          NOTARY_RETRY_DELAY_SEC: 15
          NOTARY_SUBMISSION_MAX_ATTEMPTS: 2
        run: bash ./scripts/macos-sign-notarize.sh

      - name: Sign MSI artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object { [version]($_.Directory.Parent.Name) } -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            Write-Error "signtool.exe not found"
            exit 1
          }

          $dlib = Resolve-Path "signing-tools/Microsoft.ArtifactSigning.Client/bin/x64/Azure.CodeSigning.Dlib.dll"
          $metadata = Resolve-Path "signing-tools/metadata.json"
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter *.msi -File | Select-Object -First 1
          $exe = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter *.exe -File | Select-Object -First 1
          $installer = if ($msi) { $msi } else { $exe }

          if (-not $installer) {
            Write-Error "Installer artifact not found for signing"
            exit 1
          }

          Write-Host "Signing installer: $($installer.FullName)"
          & $signtool sign /v /fd SHA256 /tr "http://timestamp.acs.microsoft.com" /td SHA256 /dlib $dlib /dmdf $metadata $installer.FullName

          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSI signing failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          Write-Host "Installer signing completed"

      - name: Find and prepare artifacts
        id: artifacts
        shell: pwsh
        run: |
          $bundleDir = "apps/desktop/src-tauri/target/release/bundle"
          Write-Host "=== Debug: Searching for artifacts ==="
          if (Test-Path $bundleDir) {
            Get-ChildItem -Path $bundleDir -Recurse -File | ForEach-Object { $_.FullName }
          } else {
            Write-Host "No bundle directory found"
          }

          $platform = "${{ matrix.platform }}"
          $arch = "${{ matrix.arch }}"

          if ($platform -eq "windows") {
            $msiArtifact = Get-ChildItem -Path $bundleDir -Recurse -Filter *.msi -File | Select-Object -First 1
            $nsisArtifact = Get-ChildItem -Path $bundleDir -Recurse -Filter *.exe -File | Select-Object -First 1
            $artifact = if ($msiArtifact) { $msiArtifact } else { $nsisArtifact }
          } else {
            $dmgArtifact = Get-ChildItem -Path $bundleDir -Recurse -Filter *.dmg -File | Select-Object -First 1
            $updaterArtifact = Get-ChildItem -Path $bundleDir -Recurse -Filter *.app.tar.gz -File | Select-Object -First 1
            $artifact = if ($dmgArtifact) { $dmgArtifact } else { $updaterArtifact }
          }

          Write-Host "=== Found artifact: $($artifact.FullName) ==="

          if (-not $artifact) {
            Write-Error "No installer artifact found."
            exit 1
          }

          $candidateSigPath = "$($artifact.FullName).sig"
          if (Test-Path $candidateSigPath) {
            $sigFile = Get-Item $candidateSigPath
          } else {
            $sigFile = Get-ChildItem -Path $bundleDir -Recurse -Filter *.sig -File | Select-Object -First 1
          }
          if ($sigFile) {
            Write-Host "=== Found signature: $($sigFile.FullName) ==="
          } else {
            Write-Host "=== No signature file found for this artifact ==="
          }

          $artifactExt = $artifact.Extension
          $artifactName = "Pecal-Desktop-v${{ steps.version.outputs.VERSION }}-$platform-$arch$artifactExt"
          $artifactPath = Join-Path $env:GITHUB_WORKSPACE $artifactName
          Copy-Item $artifact.FullName $artifactPath -Force

          "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ARTIFACT_PATH=$artifactPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          if ($sigFile) {
            $sigName = "$artifactName.sig"
            $sigPath = Join-Path $env:GITHUB_WORKSPACE $sigName
            Copy-Item $sigFile.FullName $sigPath -Force
            "SIG_NAME=$sigName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "SIG_PATH=$sigPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $signature = Get-Content $sigFile.FullName -Raw
            "SIGNATURE=$signature" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

          $fileSize = (Get-Item $artifactPath).Length
          $checksum = (Get-FileHash $artifactPath -Algorithm SHA256).Hash.ToLower()
          "FILE_SIZE=$fileSize" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "CHECKSUM=$checksum" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        id: s3_upload
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $platform = "${{ matrix.platform }}-${{ matrix.arch }}"
          $artifactName = "${{ steps.artifacts.outputs.ARTIFACT_NAME }}"
          $artifactPath = "${{ steps.artifacts.outputs.ARTIFACT_PATH }}"

          $s3Path = "s3://${{ secrets.AWS_S3_BUCKET }}/releases/v$version/$platform/$artifactName"
          aws s3 cp "$artifactPath" "$s3Path"

          $s3Url = "https://${{ secrets.AWS_S3_BUCKET }}.s3.${{ secrets.AWS_REGION }}.amazonaws.com/releases/v$version/$platform/$artifactName"
          "S3_URL=$s3Url" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          $sigName = "${{ steps.artifacts.outputs.SIG_NAME }}"
          $sigPath = "${{ steps.artifacts.outputs.SIG_PATH }}"
          if ($sigName -and (Test-Path $sigPath)) {
            aws s3 cp "$sigPath" "s3://${{ secrets.AWS_S3_BUCKET }}/releases/v$version/$platform/$sigName"
          }

      - name: Save release info to database
        shell: pwsh
        continue-on-error: true
        run: |
          $payload = @{
            version = "${{ steps.version.outputs.VERSION }}"
            platform = "${{ matrix.platform }}-${{ matrix.arch }}"
            fileName = "${{ steps.artifacts.outputs.ARTIFACT_NAME }}"
            downloadUrl = "${{ steps.s3_upload.outputs.S3_URL }}"
            fileSize = [int64]"${{ steps.artifacts.outputs.FILE_SIZE }}"
            checksum = "${{ steps.artifacts.outputs.CHECKSUM }}"
            signature = "${{ steps.artifacts.outputs.SIGNATURE }}"
            releaseNotes = "${{ github.event.head_commit.message }}"
            isPrerelease = $false
          } | ConvertTo-Json -Compress

          Invoke-RestMethod `
            -Method Post `
            -Uri "${{ secrets.API_BASE_URL }}/api/releases" `
            -Headers @{
              "Content-Type" = "application/json"
              "Authorization" = "Bearer ${{ secrets.API_SECRET_KEY }}"
            } `
            -Body $payload

      - name: Upload artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ steps.artifacts.outputs.ARTIFACT_PATH }}
            ${{ steps.artifacts.outputs.SIG_PATH }}
