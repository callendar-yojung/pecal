name: iOS EAS Build & Submit

on:
  workflow_dispatch:
    inputs:
      submit:
        description: "Submit latest build to TestFlight"
        required: false
        default: true
        type: boolean
      message:
        description: "Release note for EAS build"
        required: false
        default: ""
        type: string
  push:
    tags:
      - "ios-v*"

concurrency:
  group: ios-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ios-deploy:
    runs-on: macos-15
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      CI: true
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_NO_VCS: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Enable pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo and EAS
        run: pnpm dlx eas-cli --version

      - name: Validate Expo token
        run: |
          if [[ -z "${EXPO_TOKEN}" ]]; then
            echo "::error::EXPO_TOKEN secret is not set."
            exit 1
          fi

      - name: Build iOS on EAS
        run: |
          cd apps/mobile
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BUILD_MESSAGE="${{ github.ref_name }}"
          else
            BUILD_MESSAGE="${{ github.event.inputs.message }}"
          fi
          pnpm dlx eas-cli build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait \
            --message "${BUILD_MESSAGE:-iOS release build}"

      - name: Submit to TestFlight
        if: ${{ github.event_name == 'push' || github.event.inputs.submit == 'true' }}
        run: |
          cd apps/mobile
          pnpm dlx eas-cli submit \
            --platform ios \
            --profile production \
            --non-interactive

      - name: Print EAS diagnostics
        if: always()
        run: |
          cd apps/mobile
          pnpm dlx eas-cli whoami || true
          pnpm dlx eas-cli build:list --platform ios --limit 5 --non-interactive || true
